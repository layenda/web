<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Pages Sample</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            line-height: 1.6;
        }
        header {
            text-align: center;
            margin-bottom: 40px;
        }
        h1 {
            margin-bottom: 0;
        }
        .card {
            padding: 20px;
            background: #f4f4f4;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        footer {
            margin-top: 40px;
            text-align: center;
            color: #666;
        }
    </style>
</head>

<body>

<header>
    <h1>GitHub Pages 기본 샘플</h1>
    <p>이 페이지는 GitHub Pages로 호스팅된 예시입니다.</p>
</header>

<div class="card">
    <h2>✔ GitHub Pages란?</h2>
    <p>
        GitHub 저장소의 정적 파일을 웹사이트로 호스팅해주는 기능입니다.<br>
        HTML, CSS, JS로 구성된 사이트라면 바로 배포할 수 있습니다.
    </p>
</div>

<div class="card">
    <h2>✔ 간단한 JavaScript 출력</h2>
    <p id="time"></p>
</div>

<script>
    document.getElementById("time").innerText =
        "현재 시간: " + new Date().toLocaleString();
</script>

<footer>
    © 2026 GitHub Pages 예제
</footer>

</body>
</html>
