<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Cursor Dashboard</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="js/common.js" defer></script>
<script src="js/main.js" defer></script>
<script src="js/theme.js" defer></script>

</head>

<body>
<header>
    <h1>Cursor AI Analytics Dashboard</h1>
    <nav class="top-nav">
        <a class="active" href="index.html">대시보드</a>
        <a href="daily.html">Daily Usage</a>
        <a href="api-live.html">API Live</a>
        <a href="settings.html">Settings</a>
    </nav>
</header>

<div class="container">
    <div class="kpi-grid">
        <div class="card"><div class="kpi-title">오늘 요청</div><div id="kpi-today" class="kpi-value">-</div></div>
        <div class="card"><div class="kpi-title">7일 요청</div><div id="kpi-week" class="kpi-value">-</div></div>
        <div class="card"><div class="kpi-title">API 요청 수</div><div id="kpi-api" class="kpi-value">-</div></div>
        <div class="card"><div class="kpi-title">오류 비율</div><div id="kpi-error" class="kpi-value">-</div></div>
    </div>

    <div class="card"><canvas id="usageChart" height="120"></canvas></div>

    <div class="card">
        <h3>최근 이벤트</h3>
        <table>
            <thead><tr><th>시간</th><th>이벤트</th><th>상태</th></tr></thead>
            <tbody id="event-table"></tbody>
        </table>
    </div>
</div>
</body>
</html>
